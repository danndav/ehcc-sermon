name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Create initial lockfile
        run: |
          if [ ! -f yarn.lock ]; then
            echo "Creating initial lockfile..."
            yarn set version 4.4.1
            yarn config set enableGlobalCache false
            yarn config set nodeLinker node-modules
            yarn config set enableImmutableInstalls false
            touch yarn.lock
          fi

      - name: Install dependencies
        run: |
          yarn install

      - name: Run Tests
        run: yarn test

      - name: Install Serverless Framework
        run: npm install -g serverless
      
      - name: Build application
        run: yarn build

      - name: Run Database Migrations
        run: yarn typeorm:remote:dev:ci
        env:
          TYPEORM_URL: ${{ secrets.TYPEORM_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Deploy to AWS
        run: serverless deploy --stage dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TYPEORM_URL: ${{ secrets.TYPEORM_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          VERIFICATION_EMAIL_TEMPLATE_ID: ${{ secrets.VERIFICATION_EMAIL_TEMPLATE_ID }}
          COURIER_AUTH_TOKEN: ${{ secrets.COURIER_AUTH_TOKEN }}
          PASSWORD_RESET_EMAIL_TEMPLATE_ID: ${{ secrets.PASSWORD_RESET_EMAIL_TEMPLATE_ID }}
          ADMIN_INVITE_EMAIL_TEMPLATE_ID: ${{ secrets.ADMIN_INVITE_EMAIL_TEMPLATE_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          LEARNER_DASHBOARD_URL: ${{ secrets.LEARNER_DASHBOARD_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          AWS_BUCKET_REGION: ${{ secrets.AWS_BUCKET_REGION }}
          AWS_ASSETS_BUCKET_NAME: ${{ secrets.AWS_ASSETS_BUCKET_NAME }}
          CDN_URL: ${{ secrets.CDN_URL }}
          ADMIN_DASHBOARD_URL: ${{ secrets.ADMIN_DASHBOARD_URL }}
